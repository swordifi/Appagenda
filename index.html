<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Neon 3D · Espaço Ampliado</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0055;
            --neon-purple: #b026ff;
            --bg-dark: #0a0a12;
            --panel-dark: #121225;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            perspective: 1200px;
        }

        /* Fundo cibernético */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 18, 37, 0.8) 2px, transparent 2px),
                        linear-gradient(90deg, rgba(18, 18, 37, 0.8) 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: center;
            z-index: -1;
            transform: rotateX(60deg) scale(2);
            opacity: 0.3;
        }

        /* Container principal 3D - diâmetro aumentado */
        .scene {
            width: 95%;
            max-width: 600px; /* Aumentado de 500px para 600px */
            height: 750px;    /* Aumentado de 600px para 750px */
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            position: relative;
        }

        .scene:hover {
            transform: rotateY(5deg) rotateX(5deg);
        }

        .cube-panel {
            width: 100%;
            height: 100%;
            background: var(--panel-dark);
            border: 2px solid var(--neon-cyan);
            border-radius: 24px; /* Aumentado para ficar mais arredondado */
            padding: 35px;       /* Aumentado de 30px para 35px */
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.3),
                        inset 0 0 25px rgba(0, 243, 255, 0.15);
            display: flex;
            flex-direction: column;
            gap: 25px;          /* Aumentado de 20px para 25px */
            position: absolute;
            backface-visibility: hidden;
            transition: 0.6s ease-in-out;
        }

        #lock-screen {
            z-index: 2;
            justify-content: center;
            align-items: center;
        }

        #agenda-screen {
            transform: rotateY(180deg);
            z-index: 1;
        }

        /* Elementos Neon */
        h1, h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            margin-bottom: 10px;
        }

        h2 {
            text-shadow: 0 0 10px var(--neon-magenta), 0 0 20px var(--neon-magenta);
            font-size: 1.6rem; /* Aumentado */
        }

        .input-group {
            width: 100%;
            position: relative;
        }

        input, textarea {
            width: 100%;
            padding: 14px 18px; /* Aumentado */
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--neon-purple);
            border-radius: 10px;
            color: #fff;
            font-size: 1.05rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.5);
        }

        textarea {
            height: 160px; /* Aumentado de 120px para 160px */
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--neon-magenta);
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            text-shadow: 0 0 5px #fff;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
        }

        button:hover {
            background: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
        }

        button.cyan-btn {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        button.cyan-btn:hover {
            background: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            color: #000;
            text-shadow: none;
        }

        button.purple-btn {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(176, 38, 255, 0.2);
        }

        button.purple-btn:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
        }

        /* Lista de Anotações - espaço ampliado */
        .notes-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 8px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-height: 150px; /* Garante espaço mínimo */
        }

        .notes-container::-webkit-scrollbar {
            width: 8px;
        }
        .notes-container::-webkit-scrollbar-thumb {
            background: var(--neon-purple);
            border-radius: 4px;
        }

        .note-card {
            background: rgba(255, 255, 255, 0.02);
            border-left: 5px solid var(--neon-purple);
            padding: 16px 18px;
            border-radius: 0 12px 12px 0;
            position: relative;
            animation: fadeIn 0.5s ease;
            cursor: pointer;
            transition: 0.2s;
        }

        .note-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-left-color: var(--neon-cyan);
        }

        .note-card h4 {
            color: var(--neon-cyan);
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        .note-card p {
            font-size: 0.95rem;
            color: #ccc;
            white-space: pre-wrap;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .error-msg {
            color: var(--neon-magenta);
            font-size: 0.9rem;
            text-align: center;
            height: 18px;
            opacity: 0;
            transition: 0.3s;
        }

        /* Modal para alterar senha */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--panel-dark);
            border: 2px solid var(--neon-purple);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(176, 38, 255, 0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-box h3 {
            text-align: center;
            text-shadow: 0 0 10px var(--neon-purple);
        }

        .modal-box .error-msg {
            margin-top: -10px;
        }

        /* Controle de rotação 3D */
        .scene.unlocked {
            transform: rotateY(180deg);
        }
        .scene.unlocked #lock-screen {
            z-index: 1;
            opacity: 0;
        }
        .scene.unlocked #agenda-screen {
            z-index: 2;
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RELÓGIO DIGITAL NEON */
        .digital-clock {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-cyan);
            border-radius: 40px;
            padding: 8px 22px;
            display: inline-block;
            margin: 0 auto 8px auto;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            backdrop-filter: blur(2px);
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-shadow: 0 0 8px var(--neon-cyan), 0 0 16px var(--neon-cyan);
            font-weight: 300;
            color: #b3ffff;
            width: fit-content;
            font-variant-numeric: tabular-nums;
        }

        /* Ajuste responsivo para celular */
        @media (max-width: 480px) {
            .scene {
                height: 700px;
                width: 97%;
                max-width: 100%;
            }
            .cube-panel {
                padding: 20px;
                gap: 18px;
            }
            .digital-clock {
                font-size: 1.4rem;
                padding: 5px 14px;
            }
            h2 {
                font-size: 1.2rem;
            }
            button {
                font-size: 0.85rem;
                padding: 10px;
            }
            textarea {
                height: 120px;
            }
            .notes-container {
                min-height: 100px;
            }
            .note-card {
                padding: 12px 14px;
            }
            .note-card h4 {
                font-size: 0.95rem;
            }
            .note-card p {
                font-size: 0.85rem;
            }
        }

        /* Botão limpar tudo (com proteção) */
        .danger-zone {
            border-top: 1px solid rgba(255, 0, 85, 0.2);
            margin-top: 5px;
            padding-top: 12px;
            display: flex;
            gap: 12px;
        }
        .danger-zone button {
            border-color: #ff3366;
            color: #ff6688;
            font-size: 0.8rem;
            padding: 10px;
            box-shadow: 0 0 8px rgba(255, 0, 85, 0.2);
        }
        .danger-zone button:hover {
            background: #ff3366;
            color: #0a0a12;
            box-shadow: 0 0 20px #ff3366;
        }

        /* MODAL DE VISUALIZAÇÃO DE ARQUIVO (INDIVIDUAL) */
        #view-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #view-modal.active {
            display: flex;
        }
        .view-box {
            background: var(--panel-dark);
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .view-box h3 {
            text-shadow: 0 0 10px var(--neon-cyan);
            font-size: 1.8rem;
            word-break: break-word;
        }
        .view-box .content-area {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--neon-purple);
            font-size: 1.1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #ddd;
            min-height: 100px;
        }
        .view-box .meta-info {
            color: #888;
            font-size: 0.8rem;
            text-align: right;
            border-top: 1px solid #222;
            padding-top: 10px;
        }
        .view-box button {
            width: auto;
            padding: 10px 24px;
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            font-size: 0.9rem;
            align-self: flex-end;
        }
        .view-box button:hover {
            background: var(--neon-cyan);
            color: #000;
        }

        /* Exclusão individual protegida (senha a cada exclusão) */
        .delete-protected-btn {
            background: transparent;
            border: 1px solid #ff3366;
            color: #ff6688;
            border-radius: 6px;
            padding: 3px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 8px;
            transition: 0.2s;
        }
        .delete-protected-btn:hover {
            background: #ff3366;
            color: #0a0a12;
        }
    </style>
</head>
<body>

    <!-- Modal para alteração de senha -->
    <div class="modal-overlay" id="password-modal">
        <div class="modal-box">
            <h3>🔐 Alterar Senha</h3>
            <div class="input-group">
                <input type="password" id="old-password" placeholder="Senha atual">
            </div>
            <div class="input-group">
                <input type="password" id="new-password" placeholder="Nova senha">
            </div>
            <div class="input-group">
                <input type="password" id="confirm-password" placeholder="Confirmar nova senha">
            </div>
            <div class="error-msg" id="modal-error" style="opacity:0;">Erro ao alterar senha</div>
            <div style="display: flex; gap: 10px;">
                <button onclick="confirmPasswordChange()" style="flex:2;">Salvar</button>
                <button onclick="closePasswordModal()" style="flex:1; border-color:#666; box-shadow:none;">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL EXCLUSÃO PROTEGIDA (todos os dados) -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal-box">
            <h3>⚠️ Excluir todos os dados</h3>
            <p style="color:#aaa; text-align:center; font-size:0.9rem;">Digite sua senha para confirmar a exclusão permanente.</p>
            <div class="input-group">
                <input type="password" id="delete-password" placeholder="Senha atual">
            </div>
            <div class="error-msg" id="delete-error" style="opacity:0;">Senha incorreta</div>
            <div style="display: flex; gap: 10px;">
                <button onclick="confirmDeleteAll()" style="flex:2; border-color:var(--neon-magenta);">Excluir tudo</button>
                <button onclick="closeDeleteModal()" style="flex:1; border-color:#666; box-shadow:none;">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE VISUALIZAÇÃO INDIVIDUAL -->
    <div id="view-modal">
        <div class="view-box">
            <h3 id="view-title">Título</h3>
            <div class="content-area" id="view-content">Conteúdo</div>
            <div class="meta-info" id="view-meta">ID: 0000</div>
            <button onclick="closeViewModal()">Fechar</button>
        </div>
    </div>

    <!-- Cena Principal -->
    <div class="scene" id="main-scene">
        <!-- Tela de Bloqueio -->
        <div class="cube-panel" id="lock-screen">
            <h1>Bio-Lock</h1>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 8px;">Digite a senha para descriptografar</p>
            <div class="digital-clock" id="lock-clock">00:00:00</div>
            <div class="input-group" style="margin-top: 12px;">
                <input type="password" id="password-input" placeholder="Senha Padrão: 1234" autocomplete="off">
            </div>
            <div class="error-msg" id="error-message">Senha incorreta. Acesso negado.</div>
            <button onclick="checkPassword()">Acessar Terminal</button>
        </div>

        <!-- Tela da Agenda -->
        <div class="cube-panel" id="agenda-screen">
            <h2>Agenda Cyberpunk</h2>
            <div class="digital-clock" id="agenda-clock">00:00:00</div>

            <div class="input-group" style="display: flex; flex-direction: column; gap: 12px;">
                <input type="text" id="note-title" placeholder="Título da tarefa / anotação">
                <textarea id="note-content" placeholder="Conteúdo da anotação... (espaço ampliado)"></textarea>
                <button class="cyan-btn" onclick="addNote()">Gravar Dados</button>
            </div>

            <div class="notes-container" id="notes-list">
                <!-- Renderização dinâmica -->
            </div>

            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <button style="flex:2; padding: 8px; font-size: 0.85rem; border-color: var(--neon-purple);" onclick="openPasswordModal()">🔑 Alterar Senha</button>
                <button style="flex:1; padding: 8px; font-size: 0.85rem; border-color: #666;" onclick="lockAgenda()">Bloquear</button>
            </div>
            
            <div class="danger-zone">
                <button style="flex:2;" onclick="openDeleteModal()">🗑️ Apagar todos os dados</button>
                <!-- Calculadora removida conforme solicitado -->
            </div>
        </div>
    </div>

    <script>
        // ====== CONFIGURAÇÃO ======
        let SECRET_PASSWORD = localStorage.getItem('neon_password') || "1234";
        let notes = JSON.parse(localStorage.getItem('neon_notes')) || [];

        // ====== RELÓGIO DIGITAL ======
        function updateClocks() {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            const clock1 = document.getElementById('lock-clock');
            const clock2 = document.getElementById('agenda-clock');
            if (clock1) clock1.textContent = timeStr;
            if (clock2) clock2.textContent = timeStr;
        }
        setInterval(updateClocks, 1000);
        updateClocks();

        // ====== TELA DE BLOQUEIO ======
        function checkPassword() {
            const input = document.getElementById('password-input');
            const error = document.getElementById('error-message');
            const scene = document.getElementById('main-scene');

            if (input.value === SECRET_PASSWORD) {
                error.style.opacity = 0;
                scene.classList.add('unlocked');
                input.value = '';
                renderNotes();
            } else {
                error.style.opacity = 1;
                input.value = '';
                input.style.borderColor = 'var(--neon-magenta)';
                setTimeout(() => input.style.borderColor = 'var(--neon-purple)', 500);
            }
        }

        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        function lockAgenda() {
            document.getElementById('main-scene').classList.remove('unlocked');
        }

        // ====== MODAL DE ALTERAR SENHA ======
        function openPasswordModal() {
            document.getElementById('password-modal').classList.add('active');
            document.getElementById('old-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            document.getElementById('modal-error').style.opacity = '0';
        }

        function closePasswordModal() {
            document.getElementById('password-modal').classList.remove('active');
        }

        function confirmPasswordChange() {
            const old = document.getElementById('old-password').value;
            const newPass = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const errorEl = document.getElementById('modal-error');

            if (old !== SECRET_PASSWORD) {
                errorEl.textContent = 'Senha atual incorreta.';
                errorEl.style.opacity = '1';
                return;
            }
            if (newPass.length < 3) {
                errorEl.textContent = 'A nova senha deve ter pelo menos 3 caracteres.';
                errorEl.style.opacity = '1';
                return;
            }
            if (newPass !== confirm) {
                errorEl.textContent = 'A confirmação da senha não coincide.';
                errorEl.style.opacity = '1';
                return;
            }

            SECRET_PASSWORD = newPass;
            localStorage.setItem('neon_password', newPass);
            closePasswordModal();
            alert('✅ Senha alterada com sucesso!');
        }

        // ====== MODAL DE EXCLUSÃO PROTEGIDA (TODOS) ======
        function openDeleteModal() {
            document.getElementById('delete-modal').classList.add('active');
            document.getElementById('delete-password').value = '';
            document.getElementById('delete-error').style.opacity = '0';
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.remove('active');
        }

        function confirmDeleteAll() {
            const pass = document.getElementById('delete-password').value;
            const errorEl = document.getElementById('delete-error');

            if (pass !== SECRET_PASSWORD) {
                errorEl.textContent = 'Senha incorreta. Exclusão negada.';
                errorEl.style.opacity = '1';
                return;
            }

            if (notes.length === 0) {
                errorEl.textContent = 'Nenhum dado para excluir.';
                errorEl.style.opacity = '1';
                setTimeout(() => errorEl.style.opacity = '0', 2000);
                return;
            }

            notes = [];
            saveToStorage();
            renderNotes();
            closeDeleteModal();
            alert('🗑️ Todos os dados foram apagados com segurança.');
        }

        // ====== MODAL DE VISUALIZAÇÃO ======
        let currentViewId = null;

        function openViewModal(noteId) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;
            currentViewId = noteId;
            document.getElementById('view-title').textContent = note.title;
            document.getElementById('view-content').textContent = note.content;
            document.getElementById('view-meta').textContent = `ID: ${note.id} · Criado em ${new Date(note.id).toLocaleString()}`;
            document.getElementById('view-modal').classList.add('active');
        }

        function closeViewModal() {
            document.getElementById('view-modal').classList.remove('active');
            currentViewId = null;
        }

        // Fechar modais com ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeViewModal();
                closePasswordModal();
                closeDeleteModal();
            }
        });

        // ====== GERENCIAMENTO DE NOTAS ======
        function addNote() {
            const titleInput = document.getElementById('note-title');
            const contentInput = document.getElementById('note-content');

            if (!titleInput.value.trim() || !contentInput.value.trim()) {
                alert('Por favor, preencha o título e o conteúdo.');
                return;
            }

            const newNote = {
                id: Date.now(),
                title: titleInput.value,
                content: contentInput.value
            };

            notes.push(newNote);
            saveToStorage();
            renderNotes();

            titleInput.value = '';
            contentInput.value = '';
        }

        function deleteNoteProtected(id) {
            const pass = prompt('🔒 Digite sua senha para excluir este arquivo:');
            if (pass === null) return;
            if (pass !== SECRET_PASSWORD) {
                alert('❌ Senha incorreta. Exclusão negada.');
                return;
            }
            notes = notes.filter(note => note.id !== id);
            saveToStorage();
            renderNotes();
            if (currentViewId === id) closeViewModal();
        }

        function saveToStorage() {
            localStorage.setItem('neon_notes', JSON.stringify(notes));
        }

        function renderNotes() {
            const container = document.getElementById('notes-list');
            container.innerHTML = '';

            if (notes.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#555; font-style:italic; margin-top:20px;">Nenhum dado registrado.</p>`;
                return;
            }

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.onclick = (e) => {
                    if (e.target.classList.contains('delete-protected-btn') || e.target.closest('.delete-protected-btn')) return;
                    openViewModal(note.id);
                };
                card.innerHTML = `
                    <h4>${escapeHTML(note.title)}</h4>
                    <p>${escapeHTML(note.content)}</p>
                    <div style="margin-top:8px; display:flex; justify-content:flex-end;">
                        <button class="delete-protected-btn" onclick="event.stopPropagation(); deleteNoteProtected(${note.id})">✖ Excluir (senha)</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // Inicializa
        if (document.getElementById('main-scene').classList.contains('unlocked')) {
            renderNotes();
        }
    </script>
</body>
</html>
